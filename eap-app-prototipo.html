<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>App EAP 2026 — 3º Sargento</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111410;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#3a3f2e;border-radius:2px}
button{font-family:'Inter',sans-serif}

.device{width:390px;min-height:760px;background:#1a1d16;border-radius:32px;border:1px solid #3a3f2e;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.6);max-height:95vh}
.hdr{padding:20px 16px 12px;background:#21261b;border-bottom:1px solid #2a2f21;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#9a9684;letter-spacing:.5px}
.titulo-mod{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;color:#C7A14A;letter-spacing:1px}
.scroll{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.foot{padding:12px 16px;background:#21261b;border-top:1px solid #2a2f21;display:flex;justify-content:center;flex-shrink:0}

/* Trilha */
.card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#21261b;border:1px solid #2a2f21;border-radius:10px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#3a3f2e}
.card-ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.card-titulo{font-size:13px;font-weight:500;color:#E8E4D8;margin-bottom:2px}
.card-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#7d7a6c}

/* Barra de progresso */
.prog-bar{display:flex;gap:3px;padding:0 16px 12px;flex-shrink:0}
.prog-seg{flex:1;height:3px;border-radius:2px;transition:background .2s}

/* Slide */
.slide-card{margin:0 16px;padding:16px;background:#21261b;border:1px solid;border-radius:12px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.estagio-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:500;letter-spacing:1px;align-self:flex-start;margin-bottom:2px}
.slide-titulo{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;color:#F2EFE6;line-height:1.2}
.slide-corpo{font-size:13px;color:#c4c0b2;line-height:1.65}
.lista{list-style:none;display:flex;flex-direction:column;gap:6px}
.lista li{font-size:12px;color:#c4c0b2;line-height:1.5;display:flex;align-items:flex-start}
.lista li .bullet{margin-right:8px;flex-shrink:0}
.tabela{border-radius:8px;overflow:hidden;border:1px solid #3a3f2e}
.tabela-row{display:flex;padding:8px 10px;gap:8px}
.tabela-row:nth-child(odd){background:#ffffff08}
.tabela-item{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;min-width:110px;flex-shrink:0}
.tabela-val{font-size:12px;color:#c4c0b2;line-height:1.4}
.destaque{padding:10px 12px;border-left:3px solid;border-radius:0 6px 6px 0;font-size:12px;color:#c4c0b2;line-height:1.5}
.alerta{display:flex;align-items:flex-start;padding:10px 12px;background:#9C3D3D11;border:1px solid #9C3D3D44;border-radius:8px;font-size:12px;color:#c4c0b2;line-height:1.5;gap:8px}
.alerta-ico{flex-shrink:0;color:#9C3D3D;font-size:14px;margin-top:1px}

/* Nav */
.nav{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#21261b;border-top:1px solid #2a2f21;flex-shrink:0}
.btn-nav{display:flex;align-items:center;gap:4px;padding:8px 12px;background:#2a2f21;border:1px solid #3a3f2e;border-radius:8px;color:#9a9684;font-size:12px;cursor:pointer}
.btn-primary{display:flex;align-items:center;gap:4px;padding:8px 14px;background:#C7A14A22;border:1px solid #C7A14A66;border-radius:8px;color:#C7A14A;font-size:12px;cursor:pointer}
.btn-audio{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:#C7A14A11;border:1px solid #C7A14A33;border-radius:50%;cursor:pointer;flex-shrink:0}
.btn-back{background:transparent;border:none;color:#9a9684;font-size:12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;padding:4px 0}

/* Transcrição */
.tr-h{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;color:#C7A14A;letter-spacing:.5px;margin:16px 0 8px;padding-left:4px}
.tr-p{font-size:13px;color:#c4c0b2;line-height:1.7;margin-bottom:10px;padding-left:4px}
.tr-def{background:#21261b;border:1px solid #3a3f2e;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.tr-def-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6B8CAE;font-weight:600;margin-bottom:4px}
.tr-def-v{font-size:12px;color:#c4c0b2;line-height:1.6}
.tr-eq{background:#C7A14A11;border:1px solid #C7A14A44;border-radius:8px;padding:12px 14px;margin-bottom:10px;text-align:center;font-family:'Oswald',sans-serif;font-size:13px;color:#C7A14A;letter-spacing:1px;font-weight:600}
.banca-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:none;cursor:pointer;text-align:left}
.banca-body{padding:10px 12px;font-size:12px;color:#E8E4D8;line-height:1.6;border-top:none}
kw{background:#C7A14A22;color:#C7A14A;border-radius:3px;padding:0 3px;font-weight:600}

/* Questão */
.alt-btn{width:100%;display:flex;align-items:center;padding:10px 12px;border:1px solid #3a3f2e;border-radius:8px;margin-bottom:6px;background:#ffffff08;cursor:pointer;font-size:12px;color:#c4c0b2;text-align:left;gap:6px;transition:background .1s}
.expl{padding:10px 12px;border-left:3px solid #7A8B5E;background:#7A8B5E11;border-radius:0 6px 6px 0;font-size:12px;color:#c4c0b2;line-height:1.5;margin-bottom:8px}
</style>
</head>
<body>
<div class="device" id="app"></div>

<script>
// ── DADOS ──────────────────────────────────────────────────────
const TOPICOS = [
  { id:"preparo-mental", titulo:"Preparo Mental", emoji:"🧠",
    slides:[
      { estagio:"tema", titulo:"PREPARO MENTAL", corpo:"Fundamento psicológico que permite ao policial agir com eficiência, segurança e controle em situações de risco.", audio:"O tema é Preparo Mental — fundamento psicológico que permite ao policial agir com eficiência, segurança e controle em situações de risco." },
      { estagio:"conceito", titulo:"O Que é Preparo Mental", corpo:"Processo de pré-visualizar os prováveis problemas e ensaiar mentalmente as possibilidades de resposta.", lista:["Gera alterações fisiológicas e psicológicas no policial","Coloca o militar num estado de prontidão ampliado","Ocorre antes da intervenção — é uma preparação antecipada"], audio:"O preparo mental é o processo de pré-visualizar os problemas e ensaiar mentalmente as respostas. Essa antecipação gera alterações fisiológicas e psicológicas." },
      { estagio:"finalidade", titulo:"Por Que o Preparo Mental Importa", corpo:"A falta do preparo mental prejudicará o desempenho do policial, levando a aumento do tempo de resposta à agressão.", lista:["Uso da força poderá ser inadequado — excessivo ou insuficiente","Em cenário grave: resposta paralisante","Preparo mental + treinamento = maior probabilidade de êxito"], audio:"A falta de preparo mental prejudica o desempenho e leva a uso da força inadequado — excessivo ou insuficiente." },
      { estagio:"estrutura", titulo:"Segurança Ligada ao Preparo Mental", corpo:"A segurança do policial militar, na execução das suas tarefas, está diretamente relacionada ao seu preparo mental.", lista:["Cada intervenção é singular — exige adaptação","Policial versátil se adapta às peculiaridades de cada situação","Preparo mental antecipa e reduz o elemento surpresa"], destaque:"Sem preparo mental, o policial reage. Com preparo mental, o policial age.", audio:"A segurança do policial está diretamente relacionada ao seu preparo mental. Cada intervenção é singular e exige adaptação." },
      { estagio:"pegadinha", titulo:"Pegadinha da Banca", alerta:"A banca apresenta preparo mental como opcional ou secundário ao físico. ERRADO! É FUNDAMENTO — base de toda segurança operacional. Pode trocar 'ensaiar mentalmente' por 'treinar fisicamente'.", audio:"Pegadinha: a banca diz que preparo mental é secundário ao físico. Errado — é fundamento. Outra: troca ensaiar mentalmente por treinar fisicamente." },
      { estagio:"fixacao", titulo:"FIXAÇÃO", corpo:"Preparo mental = PRÉ-VISUALIZAR problemas + ENSAIAR MENTALMENTE respostas.", destaque:"Ausência → aumento do tempo de resposta → uso da força inadequado.", audio:"Fixe: preparo mental é pré-visualizar e ensaiar mentalmente. A ausência aumenta o tempo de resposta e leva a uso da força inadequado." },
    ],
    transcricao:{ ref:"MTP nº 3.04.01/2020-CG — Seção 2", blocos:[
      { t:"h", v:"2 PREPARO MENTAL" },
      { t:"p", v:"É fato que cada ocorrência policial possui um conjunto de variáveis que a torna única. Cada intervenção é singular, exigindo que o policial militar seja versátil e capaz de adaptar-se às peculiaridades de cada situação do cotidiano operacional. Nesse contexto, a segurança do policial militar, na execução das suas tarefas, está diretamente relacionada ao seu preparo mental.", kw:["preparo mental","versátil","singular","diretamente relacionada"] },
      { t:"def", label:"Definição", v:"O preparo mental é o processo de pré-visualizar os prováveis problemas a serem encontrados em cada tipo de intervenção policial-militar e ensaiar mentalmente as possibilidades de respostas." },
      { t:"p", v:"Essa antecipação desencadeia um conjunto de alterações fisiológicas e psicológicas, colocando o policial militar num estado de prontidão que ampliará sua capacidade de resposta a cada situação.", kw:["alterações fisiológicas e psicológicas","estado de prontidão"] },
      { t:"p", v:"A falta do preparo mental do policial militar durante uma intervenção prejudicará o seu desempenho, levando a um aumento de seu tempo de resposta à agressão e, assim, o uso da força poderá ser inadequado (excessivo ou aquém do necessário para contê-la).", kw:["falta do preparo mental","tempo de resposta","uso da força"] },
      { t:"banca", prob:"ALTA", assunto:"Definição de Preparo Mental", resp:"Processo de PRÉ-VISUALIZAR os prováveis problemas e ENSAIAR MENTALMENTE as possibilidades de resposta. Resultado: alterações fisiológicas e psicológicas que ampliam a capacidade de resposta." },
      { t:"banca", prob:"ALTA", assunto:"Consequência da FALTA do preparo mental", resp:"Aumento do tempo de resposta à agressão + uso da força inadequado (excessivo ou insuficiente)." },
      { t:"banca", prob:"MÉDIA", assunto:"Relação com segurança do policial", resp:"A segurança do policial, na execução de suas tarefas, está DIRETAMENTE relacionada ao seu preparo mental — texto literal." },
    ]},
    questoes:[
      { enunciado:"Segundo o MTP nº 3.04.01/2020-CG, o preparo mental do policial militar pode ser definido como:", alternativas:["A) O fortalecimento físico e psicológico obtido por meio do treinamento em academia","B) O processo de pré-visualizar os prováveis problemas e ensaiar mentalmente as possibilidades de resposta","C) A capacidade inata de controlar emoções em situações de risco","D) O conjunto de normas e procedimentos que regulam o comportamento policial"], correta:1, explicacao:"Definição literal do manual: 'processo de pré-visualizar os prováveis problemas e ensaiar mentalmente as possibilidades de respostas'.", pegadinha:"A alt. A confunde preparo mental com preparo físico. A banca adora essa troca." },
      { enunciado:"A falta do preparo mental durante uma intervenção, de acordo com o MTP 01, acarreta:", alternativas:["A) Apenas mudanças psicológicas sem efeito prático no desempenho","B) Aumento do tempo de resposta e possível uso da força inadequado","C) Maior criatividade na tomada de decisões táticas","D) Redução automática do estado de prontidão para o nível laranja"], correta:1, explicacao:"Falta de preparo mental → aumento do tempo de resposta → uso da força inadequado (excessivo ou insuficiente).", pegadinha:"A alt. D usa termos corretos do manual (laranja, estados de prontidão) mas fora de contexto." },
    ]
  },
  { id:"estados-prontidao", titulo:"Estados de Prontidão", emoji:"👁",
    slides:[
      { estagio:"tema", titulo:"ESTADOS DE PRONTIDÃO", corpo:"Escala de alerta mental com 5 estados, representados por cores, que indica o nível de atenção e preparação do policial.", audio:"Estados de Prontidão: cinco estados representados por cores." },
      { estagio:"conceito", titulo:"A Escala de 5 Cores", corpo:"Do menor ao maior nível de alerta:", lista:["⬜ BRANCO — Relaxado, sem atenção ao ambiente","🟡 AMARELO — Atenção geral relaxada","🟠 LARANJA — Ameaça específica identificada","🔴 VERMELHO — Risco real, ação necessária","⬛ PRETO — Colapso cognitivo e motor"], audio:"Cinco estados: branco, amarelo, laranja, vermelho e preto. São cinco, não quatro." },
      { estagio:"estrutura", titulo:"Estado Vermelho — Alarme", corpo:"Neste estado de prontidão, o risco é real e uma resposta do policial militar é necessária.", lista:["Focalizar a ameaça — atenção concentrada no problema","Transição da intervenção verbal ao uso das demais técnicas","Inclusive força potencialmente letal"], audio:"No estado vermelho, risco é real e resposta é necessária. Admite força potencialmente letal." },
      { estagio:"estrutura", titulo:"Estado Laranja — Pré-Alarme", corpo:"Estado de alerta específico onde o policial se prepara ativamente:", lista:["Identifica ameaça ou suspeito específico","Verbaliza com a guarnição: local, possíveis ações, prováveis abrigos","Prepara-se taticamente — sem enfrentar risco real ainda"], audio:"No laranja, ameaça específica identificada. O policial verbaliza com a guarnição e se prepara taticamente." },
      { estagio:"pegadinha", titulo:"Pegadinha Clássica", alerta:"A banca apresenta APENAS 4 estados, omitindo o PRETO. São 5! Branco, Amarelo, Laranja, Vermelho e PRETO. O preto (colapso) é o mais cobrado e o mais esquecido.", audio:"Pegadinha: a banca coloca quatro estados. São cinco. O preto é colapso cognitivo e motor — o mais esquecido." },
      { estagio:"fixacao", titulo:"FIXAÇÃO", corpo:"B-A-L-V-P → 5 cores: Branco · Amarelo · Laranja · Vermelho · Preto", destaque:"Patrulha rotineira = Amarelo. Ameaça específica = Laranja. Confronto = Vermelho. Colapso = Preto.", audio:"B-A-L-V-P. Cinco estados. Patrulha é Amarelo, ameaça é Laranja, confronto é Vermelho, colapso é Preto." },
    ],
    transcricao:{ ref:"MTP nº 3.04.01/2020-CG — Seção 2.1", blocos:[
      { t:"h", v:"2.1 ESTADOS DE PRONTIDÃO" },
      { t:"p", v:"O policial militar deve se manter no estado de prontidão compatível com a gravidade dos riscos que identificar, podendo migrar de um estado de prontidão a outro, de acordo com a evolução da situação.", kw:["estado de prontidão compatível","gravidade dos riscos","migrar"] },
      { t:"def", label:"a) Atenção Relaxada — Cor Amarela", v:"Policial atento ao ambiente sem foco específico. Estado de referência para o serviço policial ativo — nem relaxado demais (branco), nem em alerta específico (laranja)." },
      { t:"def", label:"b) Alerta Específico — Cor Laranja", v:"O policial identifica ameaça ou suspeito específico. Verbaliza com os demais integrantes da guarnição sobre o local, possíveis ações e prováveis abrigos." },
      { t:"def", label:"c) Estado de Alarme — Cor Vermelha", v:"O risco é real e uma resposta do policial militar é necessária. Focalizar a ameaça e ter disposição para transitar da intervenção verbal ao uso das demais técnicas, inclusive da força potencialmente letal." },
      { t:"def", label:"d) Estado de Colapso — Cor Preta", v:"Pânico com colapso cognitivo e motor. Paralisia ou ação irracional. O preparo mental existe para evitar que o policial chegue a este estado." },
      { t:"banca", prob:"ALTA", assunto:"Quantos são os estados de prontidão?", resp:"CINCO: Branco, Amarelo, Laranja, Vermelho e Preto. A banca adora apresentar apenas 4, omitindo o preto." },
      { t:"banca", prob:"ALTA", assunto:"Estado do policial em patrulha rotineira", resp:"Estado AMARELO (atenção relaxada). Nem branco (despreparado), nem laranja (que pressupõe ameaça específica identificada)." },
      { t:"banca", prob:"ALTA", assunto:"Definição do Estado de Alarme (vermelho)", resp:"'O risco é REAL e uma resposta é NECESSÁRIA.' Admite transição à força potencialmente letal. Texto literal." },
    ]},
    questoes:[
      { enunciado:"De acordo com o MTP 01, quantos são os estados de prontidão e qual representa o colapso cognitivo e motor?", alternativas:["A) 4 estados; o estado vermelho representa o colapso","B) 5 estados; o estado preto representa o colapso","C) 4 estados; o estado preto representa o colapso","D) 5 estados; o estado vermelho representa o colapso"], correta:1, explicacao:"São 5 estados. O PRETO = colapso cognitivo e motor (paralisia ou ação irracional).", pegadinha:"A banca coloca '4 estados' (alternativas A e C). Vermelho é alarme/confronto, não colapso." },
      { enunciado:"Sobre o Estado de Alarme (Cor Vermelha), assinale a afirmativa correta conforme o MTP 01:", alternativas:["A) O policial identifica ameaça específica e verbaliza com a guarnição","B) O risco é real e resposta é necessária, admitindo força potencialmente letal","C) Estado de alerta geral sem foco em ameaça específica — adequado para patrulha","D) Estado de pânico com colapso cognitivo e motor do policial"], correta:1, explicacao:"Vermelho: risco REAL, resposta NECESSÁRIA, admite força potencialmente letal. A = Laranja, C = Amarelo, D = Preto.", pegadinha:"A alt. D (colapso/pânico) parece 'alarme' mas colapso é o PRETO. Vermelho é ação; preto é paralisia." },
    ]
  },
  { id:"avaliacao-riscos", titulo:"Avaliação de Riscos", emoji:"🎯",
    slides:[
      { estagio:"tema", titulo:"AVALIAÇÃO DE RISCOS", corpo:"Processo sistemático e contínuo de identificação dos riscos de cada intervenção, antes e durante sua execução.", audio:"Avaliação de Riscos: processo contínuo de identificação dos riscos." },
      { estagio:"conceito", titulo:"Definição de Risco", corpo:"O risco é a probabilidade de concretização de uma ameaça contra pessoa e bens.", lista:["A AR é contínua — não apenas no início","O policial migra de estado de prontidão conforme a situação","AR alimenta diretamente o DPI"], audio:"Risco é a probabilidade de concretização de uma ameaça. A avaliação é contínua." },
      { estagio:"estrutura", titulo:"Posições da Arma vs. Nível de Risco", corpo:"As posições da arma correspondem aos níveis de risco:", tabela:[{item:"Localizada",valor:"Risco I ou II — percepção subjetiva"},{item:"Guarda-baixa",valor:"Risco II — risco potencial"},{item:"Guarda-alta",valor:"Risco II ou III"},{item:"Pronta resposta",valor:"Risco III — risco REAL (objetivo)"}], audio:"Posições da arma seguem o risco. Pronta resposta somente no risco três com percepção objetiva." },
      { estagio:"pegadinha", titulo:"Pegadinha", alerta:"A banca diz que a AR é feita apenas antes da abordagem. ERRADO! É CONTÍNUA. Também confunde risco potencial (subjetivo) com risco real (objetivo). Pronta resposta = exclusivo do Risco III objetivo.", audio:"Pegadinha: AR não é só antes — é contínua. E pronta resposta é risco três objetivo, não dois." },
      { estagio:"fixacao", titulo:"FIXAÇÃO", corpo:"Risco = probabilidade de concretização de ameaça. AR é contínua. Pronta resposta = Risco III objetivo.", destaque:"AR + PT = DPI — A AR é metade da equação central do MTP 01.", audio:"Risco é probabilidade. AR é contínua. Pronta resposta é risco três. AR mais PT igual a DPI." },
    ],
    transcricao:{ ref:"MTP nº 3.04.01/2020-CG — Seção 3", blocos:[
      { t:"h", v:"3 AVALIAÇÃO DE RISCOS" },
      { t:"p", v:"Toda intervenção envolve algum tipo de risco potencial que deverá ser considerado pelo policial militar. O risco é a probabilidade de concretização de uma ameaça contra pessoa e bens.", kw:["risco é a probabilidade","concretização de uma ameaça"] },
      { t:"p", v:"Cada situação exigirá que ele se mantenha no estado de prontidão compatível com a gravidade dos riscos que identificar, podendo migrar de um estado de prontidão a outro, de acordo com a evolução da situação.", kw:["migrar","evolução da situação","compatível"] },
      { t:"def", label:"ARMA LOCALIZADA", v:"Percepção subjetiva de risco potencial — Risco Nível I ou II." },
      { t:"def", label:"ARMA EM PRONTA RESPOSTA", v:"Risco real à segurança do policial e terceiros (percepção objetiva) — Risco Nível III." },
      { t:"banca", prob:"ALTA", assunto:"Definição literal de Risco", resp:"'O risco é a PROBABILIDADE de concretização de uma AMEAÇA contra pessoa e bens.' A banca troca 'probabilidade' por 'possibilidade' ou 'certeza'." },
      { t:"banca", prob:"ALTA", assunto:"Posição de arma no Risco III", resp:"PRONTA RESPOSTA — percepção OBJETIVA de risco real. Guarda-alta = subjetivo (II/III). São distintas." },
      { t:"banca", prob:"MÉDIA", assunto:"AR é pontual ou contínua?", resp:"CONTÍNUA. O policial migra de estado conforme a evolução da situação." },
    ]},

// ── ESTILOS DE ESTÁGIO ─────────────────────────────────────────
const EC = {
  tema:{cor:"#C7A14A",label:"TEMA"},
  conceito:{cor:"#7A8B5E",label:"CONCEITO"},
  finalidade:{cor:"#6B8CAE",label:"FINALIDADE"},
  estrutura:{cor:"#6B8CAE",label:"ESTRUTURA"},
  pegadinha:{cor:"#9C3D3D",label:"⚠ PEGADINHA"},
  fixacao:{cor:"#7A8B5E",label:"FIXAÇÃO"},
};

// ── PERSISTÊNCIA ───────────────────────────────────────────────
function lerProg(){ try{return JSON.parse(localStorage.getItem("eap_p26")||"{}")}catch{return{}} }
function salProg(p){ try{localStorage.setItem("eap_p26",JSON.stringify(p))}catch{} }

// ── HIGHLIGHT DE KEYWORDS ──────────────────────────────────────
function renderText(texto, kws){
  if(!kws||!kws.length) return texto;
  const parts=[], kw_lower=kws.map(k=>k.toLowerCase());
  let rem=texto;
  while(rem.length){
    let best=null,bestIdx=Infinity;
    kws.forEach((kw,ki)=>{
      const idx=rem.toLowerCase().indexOf(kw_lower[ki]);
      if(idx!==-1&&idx<bestIdx){best=kw;bestIdx=idx;}
    });
    if(!best){parts.push(document.createTextNode(rem));break;}
    if(bestIdx>0) parts.push(document.createTextNode(rem.slice(0,bestIdx)));
    const mark=document.createElement('kw');
    mark.textContent=rem.slice(bestIdx,bestIdx+best.length);
    parts.push(mark);
    rem=rem.slice(bestIdx+best.length);
  }
  return parts;
}

// ── TTS ────────────────────────────────────────────────────────
let falando=false, utter=null;
function falar(txt){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if(falando){falando=false;renderApp();return;}
  utter=new SpeechSynthesisUtterance(txt);
  utter.lang="pt-BR"; utter.rate=0.95;
  utter.onend=()=>{falando=false;renderApp();};
  window.speechSynthesis.speak(utter);
  falando=true; renderApp();
}

// ── ESTADO ─────────────────────────────────────────────────────
let state={
  tela:"trilha", ti:0, si:0, qi:0, resp:null,
  prog:lerProg(), bancas:{}
};
function setState(upd){
  Object.assign(state,upd);
  if(state.tela!=="slide") {falando=false;window.speechSynthesis&&window.speechSynthesis.cancel();}
  renderApp();
}

// ── RENDER ─────────────────────────────────────────────────────
function renderApp(){
  const app=document.getElementById('app');
  app.innerHTML='';
  const {tela,ti,si,qi,resp,prog,bancas}=state;
  const top=TOPICOS[ti];
  const sld=top?.slides[si];
  const qst=top?.questoes[qi];
  const nS=top?.slides.length||0;
  const nQ=top?.questoes.length||0;
  const ok=idx=>!!prog[TOPICOS[idx]?.id];

  if(tela==="trilha") renderTrilha(app,ok,prog);
  else if(tela==="slide") renderSlide(app,top,sld,si,nS,ti,ok);
  else if(tela==="transcricao") renderTranscricao(app,top,bancas);
  else if(tela==="questao") renderQuestao(app,top,qst,qi,nQ,resp);
  else if(tela==="concluido") renderConcluido(app,top,prog);
}

function el(tag,cls,style){const e=document.createElement(tag);if(cls)e.className=cls;if(style)e.style.cssText=style;return e;}
function div(cls,style){return el('div',cls,style);}
function span(cls,txt){const e=el('span',cls);e.textContent=txt;return e;}
function btn(cls,txt,onClick){const b=el('button',cls);b.textContent=txt;b.onclick=onClick;return b;}

// ─── TELA TRILHA ───────────────────────────────────────────────
function renderTrilha(app,ok,prog){
  const hdr=div('hdr');
  const r=div('',`display:flex;align-items:center;justify-content:space-between`);
  r.appendChild(span('lbl','🟢 DOUTRINA OPERACIONAL'));
  hdr.appendChild(r);
  const t=span('','MTP 01'); t.style.cssText='font-family:Oswald,sans-serif;font-size:18px;font-weight:600;color:#C7A14A;letter-spacing:1px';
  hdr.appendChild(t);
  hdr.appendChild(span('lbl','Manual Técnico-Profissional nº 3.04.01/2020-CG'));
  app.appendChild(hdr);

  const scr=div('scroll');
  TOPICOS.forEach((top,idx)=>{
    const done=ok(idx), blk=idx>0&&!ok(idx-1);
    const card=div('card',`opacity:${blk?.45:1};cursor:${blk?'not-allowed':'pointer'}`);
    const ic=div('card-ic',`background:${done?'#7A8B5E22':blk?'#ffffff08':'#C7A14A22'}`);
    ic.textContent=blk?'🔒':done?'✓':top.emoji;
    ic.style.color=done?'#7A8B5E':blk?'#7d7a6c':'#C7A14A';
    card.appendChild(ic);
    const info=div('');
    const tt=div('card-titulo'); tt.style.color=done?'#7A8B5E':blk?'#7d7a6c':'#E8E4D8'; tt.textContent=top.titulo;
    const mt=div('card-meta'); mt.textContent=`${top.slides.length} slides · transcrição · ${top.questoes.length} questões`;
    info.appendChild(tt); info.appendChild(mt);
    card.appendChild(info);
    if(!blk){const arr=span('','›');arr.style.cssText='color:#7d7a6c;font-size:18px';card.appendChild(arr);}
    card.onclick=()=>{
      if(blk) return;
      setState({tela:'slide',ti:idx,si:0,qi:0,resp:null,bancas:{}});
    };
    scr.appendChild(card);
  });
  app.appendChild(scr);

  const foot=div('foot');
  foot.appendChild(span('lbl',`${Object.keys(prog).length}/${TOPICOS.length} tópicos concluídos`));
  app.appendChild(foot);
}

// ─── TELA SLIDE ────────────────────────────────────────────────
function renderSlide(app,top,sld,si,nS,ti,ok){
  const cfg=EC[sld.estagio]||EC.estrutura;

  const hdr=div('hdr');
  hdr.style.flexDirection='row'; hdr.style.alignItems='center'; hdr.style.justifyContent='space-between';
  const bk=btn('btn-back','← Trilha',()=>setState({tela:'trilha'}));
  const label=span('lbl',top.titulo);
  const pg=span('lbl',`${si+1}/${nS}`);
  hdr.appendChild(bk); hdr.appendChild(label); hdr.appendChild(pg);
  app.appendChild(hdr);

  const pb=div('prog-bar');
  top.slides.forEach((_,i)=>{
    const s=div('prog-seg'); s.style.background=i<=si?cfg.cor:'#3a3f2e'; pb.appendChild(s);
  });
  app.appendChild(pb);

  const card=div('slide-card'); card.style.borderColor=cfg.cor+'44';

  const tag=div('estagio-tag'); tag.textContent=cfg.label;
  tag.style.background=cfg.cor+'22'; tag.style.color=cfg.cor;
  card.appendChild(tag);

  const titulo=div('slide-titulo'); titulo.textContent=sld.titulo; card.appendChild(titulo);
  if(sld.corpo){const p=div('slide-corpo'); p.textContent=sld.corpo; card.appendChild(p);}
  if(sld.lista){
    const ul=el('ul','lista');
    sld.lista.forEach(item=>{
      const li=el('li');
      const bull=span('bullet','›'); bull.style.color=cfg.cor;
      li.appendChild(bull); li.appendChild(document.createTextNode(item));
      ul.appendChild(li);
    });
    card.appendChild(ul);
  }
  if(sld.tabela){
    const tbl=div('tabela');
    sld.tabela.forEach(row=>{
      const tr=div('tabela-row');
      const ti=span('tabela-item',row.item); ti.style.color=cfg.cor;
      const tv=span('tabela-val',row.valor);
      tr.appendChild(ti); tr.appendChild(tv); tbl.appendChild(tr);
    });
    card.appendChild(tbl);
  }
  if(sld.destaque){
    const d=div('destaque'); d.textContent=sld.destaque;
    d.style.borderColor=cfg.cor; d.style.background=cfg.cor+'11';
    card.appendChild(d);
  }
  if(sld.alerta){
    const al=div('alerta');
    const ico=span('alerta-ico','⚠'); al.appendChild(ico);
    const txt=span('',sld.alerta); al.appendChild(txt);
    card.appendChild(al);
  }
  if(sld.lista&&sld.estagio==='pegadinha'&&sld.alerta){
    // extra lista após alerta
    const ul=el('ul','lista'); ul.style.marginTop='8px';
    sld.lista.forEach(item=>{
      const li=el('li');
      const bull=span('bullet','›'); bull.style.color=cfg.cor;
      li.appendChild(bull); li.appendChild(document.createTextNode(item));
      ul.appendChild(li);
    });
    card.appendChild(ul);
  }
  app.appendChild(card);

  const nav=div('nav');
  const bkBtn=el('button','btn-nav'); bkBtn.style.opacity=si===0?.3:1; bkBtn.disabled=si===0;
  bkBtn.innerHTML='&#8249; Anterior';
  bkBtn.onclick=()=>{if(si>0)setState({si:si-1});};

  const audBtn=el('button','btn-audio');
  audBtn.innerHTML=falando?'🔇':'🔊';
  audBtn.onclick=()=>falar(sld.audio||sld.corpo||'');

  const nextBtn=el('button','btn-primary');
  if(si<nS-1){nextBtn.innerHTML='Próximo &#8250;'; nextBtn.onclick=()=>setState({si:si+1});}
  else{nextBtn.innerHTML='📄 Ver Manual'; nextBtn.onclick=()=>setState({tela:'transcricao',bancas:{}});}

  nav.appendChild(bkBtn); nav.appendChild(audBtn); nav.appendChild(nextBtn);
  app.appendChild(nav);
}

// ─── TELA TRANSCRIÇÃO ──────────────────────────────────────────
function renderTranscricao(app,top,bancas){
  const tr=top.transcricao;

  const hdr=div('hdr');
  hdr.style.flexDirection='row'; hdr.style.alignItems='center'; hdr.style.justifyContent='space-between';
  const bk=btn('btn-back','← Slides',()=>setState({tela:'slide'}));
  const mid=div(''); mid.style.textAlign='center';
  const lbl=span('lbl','📄 TRANSCRIÇÃO'); lbl.style.color='#6B8CAE';
  mid.appendChild(lbl);
  const ref=span('lbl',tr.ref); ref.style.display='block'; ref.style.fontSize='8px'; ref.style.color='#7d7a6c';
  mid.appendChild(ref);
  hdr.appendChild(bk); hdr.appendChild(mid); hdr.appendChild(div('','width:60px'));
  app.appendChild(hdr);

  const scr=div('scroll'); scr.style.gap='0'; scr.style.padding='12px 16px';
  const inner=div('','padding:4px 4px 16px');

  tr.blocos.forEach((b,i)=>{
    if(b.t==='h'){
      const h=div('tr-h'); h.textContent=b.v; inner.appendChild(h);
    } else if(b.t==='p'){
      const p=div('tr-p');
      const parts=renderText(b.v,b.kw||[]);
      if(Array.isArray(parts)) parts.forEach(n=>p.appendChild(n));
      else p.textContent=b.v;
      inner.appendChild(p);
    } else if(b.t==='def'){
      const box=div('tr-def');
      const lbl=div('tr-def-lbl'); lbl.textContent=b.label;
      const v=div('tr-def-v'); v.textContent=b.v;
      box.appendChild(lbl); box.appendChild(v); inner.appendChild(box);
    } else if(b.t==='eq'){
      const eq=div('tr-eq'); eq.textContent=b.v; inner.appendChild(eq);
    } else if(b.t==='banca'){
      const k=`b${i}`, open=!!bancas[k];
      const cor=b.prob==='ALTA'?'#9C3D3D':'#C7A14A';
      const wrap=div('','margin-bottom:8px');

      const trigger=el('button','banca-btn');
      trigger.style.cssText=`background:${cor}18;border:1px solid ${cor}55;border-radius:${open?'8px 8px 0 0':'8px'};`;
      const left=div('','display:flex;align-items:center;gap:8px');
      const star=span('','★'); star.style.color=cor;
      const prob=span('',`⚡ ${b.prob} chance em prova`);
      prob.style.cssText=`font-family:'IBM Plex Mono',monospace;font-size:10px;color:${cor};font-weight:600`;
      left.appendChild(star); left.appendChild(prob);
      const right=div('','display:flex;align-items:center;gap:6px');
      const ass=span('',b.assunto); ass.style.cssText='font-size:11px;color:#c4c0b2';
      const arr=span('',open?'▲':'▼'); arr.style.color=cor; arr.style.fontSize='10px';
      right.appendChild(ass); right.appendChild(arr);
      trigger.appendChild(left); trigger.appendChild(right);
      trigger.onclick=()=>{
        const nb={...state.bancas,[k]:!open};
        setState({bancas:nb});
      };
      wrap.appendChild(trigger);

      if(open){
        const body=div('banca-body');
        body.style.cssText=`background:${cor}0e;border:1px solid ${cor}33;border-top:none;border-radius:0 0 8px 8px`;
        body.textContent=b.resp; wrap.appendChild(body);
      }
      inner.appendChild(wrap);
    }
  });

  scr.appendChild(inner);
  app.appendChild(scr);

  const nav=div('nav');
  const bkBtn=el('button','btn-nav'); bkBtn.innerHTML='&#8249; Slides';
  bkBtn.onclick=()=>setState({tela:'slide'});
  const nextBtn=el('button','btn-primary'); nextBtn.style.marginLeft='auto';
  nextBtn.innerHTML='Questões &#8250;';
  nextBtn.onclick=()=>setState({tela:'questao',qi:0,resp:null});
  nav.appendChild(bkBtn); nav.appendChild(nextBtn);
  app.appendChild(nav);
}

// ─── TELA QUESTÃO ──────────────────────────────────────────────
function renderQuestao(app,top,qst,qi,nQ,resp){
  const hdr=div('hdr');
  hdr.style.flexDirection='row'; hdr.style.alignItems='center'; hdr.style.justifyContent='space-between';
  const bk=btn('btn-back','← Manual',()=>setState({tela:'transcricao'}));
  hdr.appendChild(bk);
  hdr.appendChild(span('lbl',`Questão ${qi+1} de ${nQ}`));
  app.appendChild(hdr);

  const scr=div('scroll');
  const inner=div('','padding:0 4px 8px');

  const tag=div('estagio-tag'); tag.textContent='QUESTÃO DE FIXAÇÃO';
  tag.style.cssText='display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-family:IBM Plex Mono,monospace;font-weight:500;letter-spacing:1px;background:#6B8CAE22;color:#6B8CAE;margin-bottom:12px';
  inner.appendChild(tag);

  const enun=div('','font-size:13px;color:#c4c0b2;line-height:1.65;margin-bottom:16px');
  enun.textContent=qst.enunciado; inner.appendChild(enun);

  qst.alternativas.forEach((alt,i)=>{
    const b=el('button','alt-btn');
    let bg='#ffffff08', bc='#3a3f2e';
    if(resp!==null){
      if(i===qst.correta){bg='#7A8B5E22';bc='#7A8B5E';}
      else if(i===resp&&resp!==qst.correta){bg='#9C3D3D22';bc='#9C3D3D';}
      else{bg='#ffffff05';}
    }
    b.style.background=bg; b.style.borderColor=bc;
    b.style.cursor=resp!==null?'default':'pointer';
    if(resp!==null&&i===qst.correta){const ic=span('','✓');ic.style.color='#7A8B5E';ic.style.flexShrink='0';b.appendChild(ic);}
    if(resp!==null&&i===resp&&resp!==qst.correta){const ic=span('','✗');ic.style.color='#9C3D3D';ic.style.flexShrink='0';b.appendChild(ic);}
    b.appendChild(document.createTextNode(alt));
    b.onclick=()=>{if(resp===null)setState({resp:i});};
    inner.appendChild(b);
  });

  if(resp!==null){
    const expl=div('expl'); expl.innerHTML=`<strong style="color:#7A8B5E">✓ </strong>${qst.explicacao}`;
    inner.appendChild(expl);
    const al=div('alerta'); al.style.marginBottom='12px';
    al.innerHTML=`<span style="color:#9C3D3D;flex-shrink:0;margin-right:6px">⚠</span><span><strong style="color:#9C3D3D">Pegadinha: </strong>${qst.pegadinha}</span>`;
    inner.appendChild(al);
    const nx=el('button','btn-primary');
    nx.style.cssText='width:100%;justify-content:center;display:flex;padding:10px 14px;font-size:13px';
    nx.textContent=qi<nQ-1?'Próxima questão →':'Concluir tópico ✓';
    nx.onclick=()=>{
      if(qi<nQ-1) setState({qi:qi+1,resp:null});
      else {
        const ti=state.ti, top2=TOPICOS[ti];
        const np={...state.prog,[top2.id]:true};
        salProg(np);
        setState({prog:np,tela:'concluido'});
      }
    };
    inner.appendChild(nx);
  }

  scr.appendChild(inner);
  app.appendChild(scr);
}

// ─── TELA CONCLUÍDO ────────────────────────────────────────────
function renderConcluido(app,top,prog){
  const hdr=div('hdr');
  app.appendChild(hdr);
  const body=div('','display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;gap:16px;min-height:500px');
  const emoji=div('','font-size:48px;text-align:center'); emoji.textContent='🎖'; body.appendChild(emoji);
  const titulo=div('','font-family:Oswald,sans-serif;font-size:22px;color:#C7A14A;text-align:center'); titulo.textContent='TÓPICO CONCLUÍDO'; body.appendChild(titulo);
  const sub=div('','font-family:IBM Plex Mono,monospace;font-size:14px;color:#7A8B5E;text-align:center'); sub.textContent=top.titulo; body.appendChild(sub);
  const n=Object.keys(prog).length, pct=Math.round((n/TOPICOS.length)*100);
  const prog_div=div('destaque'); prog_div.style.borderColor='#C7A14A'; prog_div.style.background='#C7A14A11'; prog_div.style.textAlign='center';
  prog_div.innerHTML=`Progresso: <strong style="color:#C7A14A">${n}/${TOPICOS.length} tópicos (${pct}%)</strong>`;
  body.appendChild(prog_div);
  const bk=el('button','btn-primary'); bk.style.cssText='width:100%;justify-content:center;display:flex;padding:12px 14px;font-size:14px;margin-top:8px';
  bk.textContent='Voltar à Trilha'; bk.onclick=()=>setState({tela:'trilha'});
  body.appendChild(bk);
  app.appendChild(body);
}

// ── INIT ───────────────────────────────────────────────────────
renderApp();
</script>
