// ── HIGHLIGHT ──────────────────────────────────────────────────
function renderText(texto, kws){
  if(!kws||!kws.length) return [document.createTextNode(texto)];
  const parts=[], kw_lower=kws.map(k=>k.toLowerCase());
  let rem=texto;
  while(rem.length){
    let best=null,bestIdx=Infinity;
    kws.forEach((kw,ki)=>{ const idx=rem.toLowerCase().indexOf(kw_lower[ki]); if(idx!==-1&&idx<bestIdx){best=kw;bestIdx=idx;} });
    if(!best){parts.push(document.createTextNode(rem));break;}
    if(bestIdx>0) parts.push(document.createTextNode(rem.slice(0,bestIdx)));
    const mark=document.createElement('kw'); mark.textContent=rem.slice(bestIdx,bestIdx+best.length);
    parts.push(mark);
    rem=rem.slice(bestIdx+best.length);
  }
  return parts;
}

// ── TTS ────────────────────────────────────────────────────────
let falando=false,ttsTimer=null;
function falar(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  if(ttsTimer){clearInterval(ttsTimer);ttsTimer=null;}
  if(falando){falando=false;renderApp();return;}
  const u=new SpeechSynthesisUtterance(txt);u.lang='pt-BR';u.rate=0.95;
  u.onstart=()=>{ttsTimer=setInterval(()=>{window.speechSynthesis.pause();window.speechSynthesis.resume();},10000);};
  u.onend=()=>{falando=false;if(ttsTimer){clearInterval(ttsTimer);ttsTimer=null;}renderApp();};
  u.onerror=()=>{falando=false;if(ttsTimer){clearInterval(ttsTimer);ttsTimer=null;}};
  function doSpeak(){const vs=window.speechSynthesis.getVoices();const pv=vs.find(v=>v.lang.startsWith('pt'));if(pv)u.voice=pv;window.speechSynthesis.speak(u);falando=true;renderApp();}
  if(window.speechSynthesis.getVoices().length>0)doSpeak();else window.speechSynthesis.onvoiceschanged=doSpeak;
}

let state={ tela:"trilha", ti:0, si:0, qi:0, resp:null, prog:lerProg(), bancas:{} };
function setState(upd){
  const sc=document.querySelector('.scroll');const sp=sc?sc.scrollTop:0;const pt=state.tela;
  Object.assign(state,upd);
  if(state.tela!=="slide"){falando=false;window.speechSynthesis&&window.speechSynthesis.cancel();}
  renderApp();
  if(state.tela===pt){const sc2=document.querySelector('.scroll');if(sc2)sc2.scrollTop=sp;}
}

// ── HELPERS ────────────────────────────────────────────────────
function el(tag,cls,style){const e=document.createElement(tag);if(cls)e.className=cls;if(style)e.style.cssText=style;return e;}
function div(cls,style){return el('div',cls,style);}
function span(cls,txt){const e=el('span',cls);if(txt!==undefined)e.textContent=txt;return e;}
function btn(cls,txt,fn){const b=el('button',cls);b.textContent=txt;b.onclick=fn;return b;}

// ── RENDER PRINCIPAL ───────────────────────────────────────────
function renderApp(){
  const app=document.getElementById('app'); app.innerHTML='';
  const {tela,ti,si,qi,resp,prog,bancas}=state;
  const top=BLOCO.topicos[ti];
  const sld=top?.slides[si];
  const qst=top?.questoes[qi];
  const nS=top?.slides.length||0;
  const nQ=top?.questoes.length||0;
  const ok=idx=>!!prog[BLOCO.topicos[idx]?.id];

  if(tela==="trilha")       renderTrilha(app,ok,prog);
  else if(tela==="slide")   renderSlide(app,top,sld,si,nS);
  else if(tela==="transcricao") renderTranscricao(app,top,bancas);
  else if(tela==="questao") renderQuestao(app,top,qst,qi,nQ,resp);
  else if(tela==="concluido") renderConcluido(app,top,prog);
}

  const scr=div('scroll');
  BLOCO.topicos.forEach((top,idx)=>{
    const done=ok(idx), blk=idx>0&&!ok(idx-1);

    const ic=div('card-ic',`background:${done?'#7A8B5E22':blk?'#ffffff08':'#C7A14A22'}`);

    info.appendChild(tt); info.appendChild(mt); card.appendChild(info);
    if(!blk){const arr=span('','›');arr.style.cssText='color:#7d7a6c;font-size:18px';card.appendChild(arr);}
    card.onclick=()=>{ if(!blk) setState({tela:'slide',ti:idx,si:0,qi:0,resp:null,bancas:{}}); };
    scr.appendChild(card);
  });
  app.appendChild(scr);

  const foot=div('foot');
  foot.appendChild(span('lbl','← voltar ao início'));
  foot.style.cursor='pointer';
  foot.onclick=()=>window.location.href='eap-inicio.html';
  app.appendChild(foot);
}

// ── TELA SLIDE ─────────────────────────────────────────────────
function renderSlide(app,top,sld,si,nS){
  const cfg=EC[sld.estagio]||EC.estrutura;

  const hdr=div('hdr'); hdr.style.cssText='flex-direction:row;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:#21261b;border-bottom:1px solid #2a2f21;flex-shrink:0;display:flex';
  hdr.appendChild(btn('btn-back','← Trilha',()=>setState({tela:'trilha'})));
  const mid=div('','text-align:center'); mid.appendChild(span('lbl',top.titulo)); hdr.appendChild(mid);
  hdr.appendChild(span('lbl',`${si+1}/${nS}`));
  app.appendChild(hdr);

  const pb=div('prog-bar');
  top.slides.forEach((_,i)=>{ const s=div('prog-seg'); s.style.background=i<=si?cfg.cor:'#3a3f2e'; pb.appendChild(s); });
  app.appendChild(pb);

  const card=div('slide-card'); card.style.borderColor=cfg.cor+'44';
  const tag=div('estagio-tag'); tag.textContent=cfg.label; tag.style.background=cfg.cor+'22'; tag.style.color=cfg.cor;
  card.appendChild(tag);
  const titulo=div('slide-titulo'); titulo.textContent=sld.titulo; card.appendChild(titulo);
  if(sld.corpo){const p=div('slide-corpo'); p.textContent=sld.corpo; card.appendChild(p);}
  if(sld.lista){
    const ul=el('ul','lista');
    sld.lista.forEach(item=>{
      const li=el('li'); const bull=span('','›'); bull.style.cssText=`color:${cfg.cor};margin-right:8px;flex-shrink:0`;
      li.appendChild(bull); li.appendChild(document.createTextNode(item)); ul.appendChild(li);
    });
    card.appendChild(ul);
  }
  if(sld.tabela){
    const tbl=div('tabela');
    sld.tabela.forEach(row=>{
      const tr=div('tabela-row');
      const ti=span('tabela-item',row.item); ti.style.color=cfg.cor;
      const tv=span('tabela-val',row.valor);
      tr.appendChild(ti); tr.appendChild(tv); tbl.appendChild(tr);
    });
    card.appendChild(tbl);
  }
  if(sld.destaque){const d=div('destaque'); d.textContent=sld.destaque; d.style.borderColor=cfg.cor; d.style.background=cfg.cor+'11'; card.appendChild(d);}
  if(sld.alerta){const al=div('alerta'); const ico=span('','⚠'); ico.style.cssText='color:#9C3D3D;flex-shrink:0;font-size:14px'; al.appendChild(ico); al.appendChild(document.createTextNode(sld.alerta)); card.appendChild(al);}
  app.appendChild(card);

  const nav=div('nav');
  const bk=el('button','btn-nav'); bk.innerHTML='&#8249; Anterior'; bk.style.opacity=si===0?.3:1; bk.disabled=si===0; bk.onclick=()=>{if(si>0)setState({si:si-1});};
  const au=el('button','btn-audio'); au.innerHTML=falando?'🔇':'🔊'; au.onclick=()=>falar(sld.audio||sld.corpo||'');
  const nx=el('button','btn-primary');
  if(si<nS-1){nx.innerHTML='Próximo &#8250;'; nx.onclick=()=>setState({si:si+1});}
  else{nx.innerHTML='📄 Ver Manual'; nx.onclick=()=>setState({tela:'transcricao',bancas:{}});}
  nav.appendChild(bk); nav.appendChild(au); nav.appendChild(nx);
  app.appendChild(nav);
}

// ── TELA TRANSCRIÇÃO ───────────────────────────────────────────
function renderTranscricao(app,top,bancas){
  const tr=top.transcricao;
  const hdr=div('hdr'); hdr.style.cssText='flex-direction:row;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:#21261b;border-bottom:1px solid #2a2f21;flex-shrink:0;display:flex';
  hdr.appendChild(btn('btn-back','← Slides',()=>setState({tela:'slide'})));
  const mid=div('','text-align:center');
  const lbl=span('lbl','📄 TRANSCRIÇÃO'); lbl.style.color='#6B8CAE'; mid.appendChild(lbl);
  const ref=document.createElement('div'); ref.className='lbl'; ref.textContent=tr.ref; ref.style.cssText='font-size:8px;color:#7d7a6c;margin-top:2px'; mid.appendChild(ref);
  hdr.appendChild(mid); hdr.appendChild(div('','width:60px'));
  app.appendChild(hdr);

  const scr=div('scroll',''); scr.style.gap='0'; scr.style.padding='12px 16px';
  const inner=div('','padding:4px 4px 16px');

  tr.blocos.forEach((b,i)=>{
    if(b.t==='h'){const h=div('tr-h'); h.textContent=b.v; inner.appendChild(h);}
    else if(b.t==='p'){
      const p=div('tr-p');
      renderText(b.v,b.kw||[]).forEach(n=>p.appendChild(n));
      inner.appendChild(p);
    }
    else if(b.t==='def'){
      const box=div('tr-def');
      const lbl=div('tr-def-lbl'); lbl.textContent=b.label;
      const v=div('tr-def-v'); v.textContent=b.v;
      box.appendChild(lbl); box.appendChild(v); inner.appendChild(box);
    }
    else if(b.t==='eq'){const eq=div('tr-eq'); eq.textContent=b.v; inner.appendChild(eq);}
    else if(b.t==='banca'){
      const k=`b${i}`, open=!!bancas[k], cor=b.prob==='ALTA'?'#9C3D3D':'#C7A14A';
      const wrap=div('','margin-bottom:8px');
      const trigger=el('button','banca-btn');
      trigger.style.cssText=`background:${cor}18;border:1px solid ${cor}55;border-radius:${open?'8px 8px 0 0':'8px'};`;
      const left=div('','display:flex;align-items:center;gap:8px');
      const star=span('','★'); star.style.color=cor;
      const prob=span('',`⚡ ${b.prob} chance em prova`); prob.style.cssText=`font-family:'IBM Plex Mono',monospace;font-size:10px;color:${cor};font-weight:600`;
      left.appendChild(star); left.appendChild(prob);
      const right=div('','display:flex;align-items:center;gap:6px');
      const ass=span('',b.assunto); ass.style.cssText='font-size:11px;color:#c4c0b2';
      const arr=span('',open?'▲':'▼'); arr.style.color=cor; arr.style.fontSize='10px';
      right.appendChild(ass); right.appendChild(arr);
      trigger.appendChild(left); trigger.appendChild(right);
      trigger.onclick=()=>setState({bancas:{...state.bancas,[k]:!open}});
      wrap.appendChild(trigger);
      if(open){const body=div('banca-body'); body.style.cssText=`background:${cor}0e;border:1px solid ${cor}33;border-top:none;border-radius:0 0 8px 8px`; body.textContent=b.resp; wrap.appendChild(body);}
      inner.appendChild(wrap);
    }
  });
  scr.appendChild(inner); app.appendChild(scr);

  const nav=div('nav');
  const bk=el('button','btn-nav'); bk.innerHTML='&#8249; Slides'; bk.onclick=()=>setState({tela:'slide'});
  const nx=el('button','btn-primary'); nx.style.marginLeft='auto'; nx.innerHTML='Questões &#8250;'; nx.onclick=()=>setState({tela:'questao',qi:0,resp:null});
  nav.appendChild(bk); nav.appendChild(nx); app.appendChild(nav);
}

// ── TELA QUESTÃO ───────────────────────────────────────────────
function renderQuestao(app,top,qst,qi,nQ,resp){
  const hdr=div('hdr'); hdr.style.cssText='flex-direction:row;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:#21261b;border-bottom:1px solid #2a2f21;flex-shrink:0;display:flex';
  hdr.appendChild(btn('btn-back','← Manual',()=>setState({tela:'transcricao'})));
  hdr.appendChild(span('lbl',`Questão ${qi+1} de ${nQ}`));
  app.appendChild(hdr);

  const scr=div('scroll'); const inner=div('','padding:0 4px 8px');
  const tag=div('estagio-tag'); tag.textContent='QUESTÃO DE FIXAÇÃO';
  tag.style.cssText='display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-family:IBM Plex Mono,monospace;font-weight:500;letter-spacing:1px;background:#6B8CAE22;color:#6B8CAE;margin-bottom:12px';
  inner.appendChild(tag);
  const enun=div('','font-size:13px;color:#c4c0b2;line-height:1.65;margin-bottom:16px'); enun.textContent=qst.enunciado; inner.appendChild(enun);

  qst.alternativas.forEach((alt,i)=>{
    const b=el('button','alt-btn');
    let bg='#ffffff08', bc='#3a3f2e';
    if(resp!==null){ if(i===qst.correta){bg='#7A8B5E22';bc='#7A8B5E';} else if(i===resp&&resp!==qst.correta){bg='#9C3D3D22';bc='#9C3D3D';} else{bg='#ffffff05';} }
    b.style.background=bg; b.style.borderColor=bc; b.style.cursor=resp!==null?'default':'pointer';
    if(resp!==null&&i===qst.correta){const ic=span('','✓');ic.style.cssText='color:#7A8B5E;flex-shrink:0';b.appendChild(ic);}
    if(resp!==null&&i===resp&&resp!==qst.correta){const ic=span('','✗');ic.style.cssText='color:#9C3D3D;flex-shrink:0';b.appendChild(ic);}
    b.appendChild(document.createTextNode(alt));
    b.onclick=()=>{if(resp===null)setState({resp:i});};
    inner.appendChild(b);
  });

  if(resp!==null){
    const expl=div('expl'); expl.innerHTML=`<strong style="color:#7A8B5E">✓ </strong>${qst.explicacao}`; inner.appendChild(expl);
    const al=div('alerta'); al.style.marginBottom='12px'; al.innerHTML=`<span style="color:#9C3D3D;flex-shrink:0;margin-right:6px">⚠</span><span><strong style="color:#9C3D3D">Pegadinha: </strong>${qst.pegadinha}</span>`; inner.appendChild(al);
    const nx=el('button','btn-primary'); nx.style.cssText='width:100%;justify-content:center;display:flex;padding:10px 14px;font-size:13px';
    nx.textContent=qi<nQ-1?'Próxima questão →':'Concluir tópico ✓';
    nx.onclick=()=>{
      if(qi<nQ-1) setState({qi:qi+1,resp:null});
      else { const ti=state.ti, top2=BLOCO.topicos[ti], np={...state.prog,[top2.id]:true}; salProg(np); setState({prog:np,tela:'concluido'}); }
    };
    inner.appendChild(nx);
  }
  scr.appendChild(inner); app.appendChild(scr);
}

// ── TELA CONCLUÍDO ─────────────────────────────────────────────
function renderConcluido(app,top,prog){
  const hdr=div('hdr'); app.appendChild(hdr);
  const body=div('','display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;gap:16px;min-height:500px');
  const em=div('','font-size:48px;text-align:center'); em.textContent='🎖'; body.appendChild(em);
  const tt=div('','font-family:Oswald,sans-serif;font-size:22px;color:#C7A14A;text-align:center'); tt.textContent='TÓPICO CONCLUÍDO'; body.appendChild(tt);
  const st=div('','font-family:IBM Plex Mono,monospace;font-size:14px;color:#7A8B5E;text-align:center'); st.textContent=top.titulo; body.appendChild(st);
  const n=Object.keys(prog).length, pct=Math.round((n/BLOCO.topicos.length)*100);
  const pd=div('destaque'); pd.style.cssText='border-color:#C7A14A;background:#C7A14A11;text-align:center'; pd.innerHTML=`Progresso Bloco 1: <strong style="color:#C7A14A">${n}/${BLOCO.topicos.length} tópicos (${pct}%)</strong>`; body.appendChild(pd);
  const bk=el('button','btn-primary'); bk.style.cssText='width:100%;justify-content:center;display:flex;padding:12px 14px;font-size:14px;margin-top:8px'; bk.textContent='Voltar à Trilha'; bk.onclick=()=>setState({tela:'trilha'}); body.appendChild(bk);
  app.appendChild(body);
}

renderApp();
</script>
</body>
